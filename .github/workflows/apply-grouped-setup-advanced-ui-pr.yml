name: Apply grouped setup advanced UI on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-advanced-options-grouped-mobile'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Run the isolated setup UX patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-grouped-setup-advanced-ui.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = text.index(start_marker) + len(start_marker)
          end = text.index(end_marker, start)
          script = textwrap.dedent(text[start:end])
          exec(compile(script, str(workflow), 'exec'), {'__name__': '__main__'})
          PY

      - name: Commit grouped setup UX
        shell: bash
        run: |
          rm -f .github/workflows/apply-grouped-setup-advanced-ui-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stoney_verify/commands_ext/public_setup_recommend.py \
            tests/test_setup_advanced_options_behavior.py \
            tests/test_setup_single_guided_front_door_static.py \
            tests/test_setup_ux_clarity_guard_retired.py \
            tools/audit_setup_safety.py \
            .github/workflows/apply-grouped-setup-advanced-ui.yml \
            .github/workflows/apply-grouped-setup-advanced-ui-pr.yml
          git diff --cached --check
          git commit -m "ux: group advanced setup options for mobile"
          git push origin HEAD:fix/setup-advanced-options-grouped-mobile
