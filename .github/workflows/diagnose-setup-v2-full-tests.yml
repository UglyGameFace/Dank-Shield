name: Diagnose final setup v2 unit failures

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run full unit suite
        id: pytest
        continue-on-error: true
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        shell: bash
        run: |
          python -m pytest tests/ -q --tb=short > setup-v2-pytest-output.txt 2>&1
      - name: Save failure summary
        if: always()
        shell: bash
        run: |
          tail -260 setup-v2-pytest-output.txt > setup-v2-pytest-tail.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup-v2-pytest-tail.txt
          git commit -m "chore: capture final setup v2 pytest failures" || true
          git push origin HEAD:fix/setup-single-path-front-door-v2
      - name: Fail when pytest failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
