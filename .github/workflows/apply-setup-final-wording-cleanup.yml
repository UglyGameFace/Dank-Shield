name: Apply final setup wording cleanup

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install pytest

      - name: Apply final wording cleanup
        run: python tools/apply_setup_final_wording_cleanup.py

      - name: Validate final wording cleanup
        run: |
          python -m py_compile \
            stoney_verify/commands_ext/public_setup_recommend.py \
            stoney_verify/commands_ext/public_setup_fresh_choice.py \
            tests/test_setup_single_path_front_door_v2_static.py
          python -m pytest tests/test_setup_single_path_front_door_v2_static.py -q
          git diff --check

      - name: Commit final wording cleanup
        run: |
          rm -f tools/apply_setup_final_wording_cleanup.py
          rm -f .github/workflows/apply-setup-final-wording-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ux: make final Dank setup wording consistent"
          git push origin HEAD:fix/setup-single-path-front-door-v2
