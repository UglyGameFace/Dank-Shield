name: Temporary PR99 setup UI applier

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-access-spamguard-defaults-startup-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/setup-access-spamguard-defaults-startup-cleanup
          fetch-depth: 1
          show-progress: false

      - name: Apply PR99 setup UI patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: python tools/_temp_apply_pr99_setup_ui.py
