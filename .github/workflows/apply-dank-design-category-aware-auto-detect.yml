name: Apply category-aware Dank Design auto-detect

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

concurrency:
  group: dank-design-category-aware-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/dank-design-category-aware-auto-detect' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply Smart Auto-Detect rewrite
        run: python tools/apply_dank_design_category_aware_auto_detect.py

      - name: Validate focused design behavior
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m py_compile \
            stoney_verify/services/server_design_studio.py \
            stoney_verify/services/server_design_majority_layout.py \
            stoney_verify/commands_ext/public_design_studio.py \
            stoney_verify/startup_guards/server_design_majority_layout_guard.py
          python -m pytest \
            tests/test_server_design_majority_layout.py \
            tests/test_server_design_majority_confidence_static.py \
            tests/test_server_design_category_aware_auto_detect.py -q
          python tools/test_dank_design_safe_repair_cleanup_static.py
          python tools/test_dank_design_ux_lock_cleanup_static.py
          python tools/test_dank_design_clean_simple_unlock_ui_static.py
          git diff --check

      - name: Validate full suite
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m pytest tests/ -q
          status=0
          for f in tools/test_*.py; do
            python "$f" || status=1
          done
          test "$status" -eq 0

      - name: Commit permanent fix
        run: |
          rm -f tools/apply_dank_design_category_aware_auto_detect.py
          rm -f .github/workflows/apply-dank-design-category-aware-auto-detect.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: make Dank Design auto-detect category aware"
          git push origin HEAD:fix/dank-design-category-aware-auto-detect
