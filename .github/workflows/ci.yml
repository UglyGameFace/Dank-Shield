name: Dank Shield CI

on:
  pull_request:
  push:
    branches:
      - main
      - fix/dank-design-category-aware-auto-detect

permissions:
  contents: write

jobs:
  python-compile:
    name: Python compile check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python modules
        run: python -m compileall -q stoney_verify main.py tools

      - name: Run unit test suite
        run: python -m pytest tests/ -q
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run standalone tool checks
        run: |
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Audit public setup text and isolation
        run: python tools/audit_public_setup.py

      - name: Audit public command surface and startup friction
        run: python tools/audit_public_command_friction.py

      - name: Audit public invite permissions
        run: python tools/audit_public_invite_permissions.py

      - name: Audit setup safety rules
        run: python tools/audit_setup_safety.py

      - name: Audit role truth ownership
        run: python tools/audit_role_truth.py

      - name: Audit event boundary ownership
        run: python tools/audit_event_boundary.py

  finalize-smart-auto-detect:
    name: Finalize Smart Auto-Detect
    if: github.event_name == 'push' && github.ref == 'refs/heads/fix/dank-design-category-aware-auto-detect' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out latest feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/dank-design-category-aware-auto-detect
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Restore unrelated Python startup files before patching
        run: |
          cp tools/sitecustomize_smart_auto_detect_original.txt sitecustomize.py
          cp tools/usercustomize_smart_auto_detect_original.txt usercustomize.py

      - name: Apply permanent Smart Auto-Detect changes
        run: |
          python tools/apply_dank_design_category_aware_auto_detect.py
          python tools/apply_dank_design_category_aware_followup.py

      - name: Validate focused category-aware behavior
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m py_compile \
            stoney_verify/services/server_design_studio.py \
            stoney_verify/services/server_design_majority_layout.py \
            stoney_verify/commands_ext/public_design_studio.py \
            stoney_verify/startup_guards/server_design_majority_layout_guard.py
          python -m pytest \
            tests/test_server_design_majority_layout.py \
            tests/test_server_design_majority_confidence_static.py \
            tests/test_server_design_category_aware_auto_detect.py -q
          python tools/test_dank_design_safe_repair_cleanup_static.py
          python tools/test_dank_design_ux_lock_cleanup_static.py
          python tools/test_dank_design_clean_simple_unlock_ui_static.py
          git diff --check

      - name: Validate full repository
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m pytest tests/ -q
          status=0
          for f in tools/test_*.py; do
            python "$f" || status=1
          done
          test "$status" -eq 0
          python tools/audit_public_setup.py
          python tools/audit_public_command_friction.py
          python tools/audit_public_invite_permissions.py
          python tools/audit_setup_safety.py
          python tools/audit_role_truth.py
          python tools/audit_event_boundary.py

      - name: Remove all temporary validation machinery
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/apply-dank-design-category-aware-auto-detect.yml
          rm -f tools/apply_dank_design_category_aware_auto_detect.py
          rm -f tools/apply_dank_design_category_aware_followup.py
          rm -f tools/apply_dank_design_category_aware_separator_identity.py
          rm -f tools/sitecustomize_smart_auto_detect_original.txt
          rm -f tools/usercustomize_smart_auto_detect_original.txt
          rm -f dank-design-category-aware-failure.txt
          rm -f dank-design-category-aware-focused.txt
          git diff --check

      - name: Commit permanent fix only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: make Dank Design auto-detect category aware"
          git push origin HEAD:fix/dank-design-category-aware-auto-detect
