name: Dank Shield CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-compile:
    name: Python compile check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Check committed diff whitespace
        run: git diff --check "$(git merge-base origin/main HEAD)"..HEAD

      - name: Compile Python modules
        run: python -m compileall -q stoney_verify main.py tools

      - name: Run unit test suite
        run: python -m pytest tests/ -q --tb=short --disable-warnings
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run standalone tool checks
        run: |
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Audit public setup text and isolation
        run: python tools/audit_public_setup.py

      - name: Audit canonical public command surface
        run: python tools/audit_public_command_surface.py

      - name: Audit public command surface and startup friction
        run: python tools/audit_public_command_friction.py

      - name: Audit public invite permissions
        run: python tools/audit_public_invite_permissions.py

      - name: Audit setup safety rules
        run: python tools/audit_setup_safety.py

      - name: Audit Dank Design Smart Auto-Detect
        run: python tools/audit_dank_design_smart_auto_detect.py

      - name: Audit role truth ownership
        run: python tools/audit_role_truth.py

      - name: Audit event boundary ownership
        run: python tools/audit_event_boundary.py

  apply-setup-overhaul-once:
    name: Apply setup UX overhaul once
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/setup-navigation-ux-overhaul'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Check one-time gate
        id: gate
        shell: bash
        run: |
          if [[ -f .github/APPLY_SETUP_UX_ONCE ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "One-time setup UX gate is absent; nothing to apply."
          fi

      - name: Set up Python
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Prepare validated historical patch runner
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          git show 2c712d36f4966e4042615b59a2b29f96affc11d7:tools/apply_setup_navigation_ux_overhaul.sh > /tmp/apply_setup_navigation_ux_overhaul.sh
          git show 2c712d36f4966e4042615b59a2b29f96affc11d7:tools/run_setup_navigation_ux_overhaul_v3.sh > /tmp/run_setup_navigation_ux_overhaul_v3.sh
          python - <<'PY'
          from pathlib import Path

          apply_path = Path('/tmp/apply_setup_navigation_ux_overhaul.sh')
          apply_text = apply_path.read_text(encoding='utf-8')
          apply_text = apply_text.replace(
              'git commit -m "Unify setup state navigation and completion"',
              'echo "✅ Hosted runner would commit setup overhaul"',
              1,
          )
          apply_text = apply_text.replace(
              'git push origin fix/setup-navigation-ux-overhaul',
              'echo "✅ Hosted runner would push setup overhaul"',
              1,
          )
          apply_path.write_text(apply_text, encoding='utf-8')
          apply_path.chmod(0o755)

          runner_path = Path('/tmp/run_setup_navigation_ux_overhaul_v3.sh')
          runner_text = runner_path.read_text(encoding='utf-8')
          runner_text = runner_text.replace(
              'SOURCE="tools/apply_setup_navigation_ux_overhaul.sh"',
              'SOURCE="/tmp/apply_setup_navigation_ux_overhaul.sh"',
              1,
          )
          runner_path.write_text(runner_text, encoding='utf-8')
          runner_path.chmod(0o755)
          PY

      - name: Apply overhaul with disposable preflight
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          rm -rf "$HOME/Dank-Shield"
          ln -s "$GITHUB_WORKSPACE" "$HOME/Dank-Shield"
          if ! TMPDIR=/tmp bash /tmp/run_setup_navigation_ux_overhaul_v3.sh > /tmp/setup-overhaul.log 2>&1; then
            tail -n 160 /tmp/setup-overhaul.log
            exit 1
          fi
          tail -n 80 /tmp/setup-overhaul.log

      - name: Upload failed setup-overhaul log
        if: failure() && steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: setup-overhaul-failure-log
          path: /tmp/setup-overhaul.log
          retention-days: 1

      - name: Remove one-time CI scaffolding
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/APPLY_SETUP_UX_ONCE
          rm -f /tmp/apply_setup_navigation_ux_overhaul.sh /tmp/run_setup_navigation_ux_overhaul_v3.sh /tmp/setup-overhaul.log

      - name: Validate generated source
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          git diff --check
          python -m compileall -q stoney_verify main.py tools
          python -m pytest tests/ -q --tb=short --disable-warnings
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          test "$status" -eq 0
          python tools/audit_public_setup.py
          python tools/audit_public_command_surface.py
          python tools/audit_public_command_friction.py
          python tools/audit_public_invite_permissions.py
          python tools/audit_setup_safety.py
          python tools/audit_dank_design_smart_auto_detect.py
          python tools/audit_role_truth.py
          python tools/audit_event_boundary.py

      - name: Commit validated overhaul and remove scaffolding
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git reset
          git add -A
          allowed='^(\.github/workflows/ci\.yml|\.github/APPLY_SETUP_UX_ONCE|stoney_verify/setup_service_state\.py|stoney_verify/commands_ext/public_setup_config_writer\.py|stoney_verify/commands_ext/public_setup_fresh_choice\.py|stoney_verify/commands_ext/public_setup_recommend\.py|stoney_verify/commands_ext/public_setup_solid\.py|tests/test_setup_navigation_ux_overhaul_behavior\.py)$'
          unexpected="$(git diff --cached --name-only | grep -Ev "$allowed" || true)"
          if [[ -n "$unexpected" ]]; then
            echo "Unexpected staged files:"
            printf '%s\n' "$unexpected"
            exit 1
          fi
          git commit -m "Unify setup navigation and completion"
          git push origin HEAD:fix/setup-navigation-ux-overhaul
