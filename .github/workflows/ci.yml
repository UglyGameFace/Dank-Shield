name: Dank Shield CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-compile:
    name: Python compile check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Check committed diff whitespace
        run: git diff --check "$(git merge-base origin/main HEAD)"..HEAD

      - name: Compile Python modules
        run: python -m compileall -q stoney_verify main.py tools

      - name: Run unit test suite
        run: python -m pytest tests/ -q --tb=short --disable-warnings
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run standalone tool checks
        run: |
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Audit public setup text and isolation
        run: python tools/audit_public_setup.py

      - name: Audit canonical public command surface
        run: python tools/audit_public_command_surface.py

      - name: Audit public command surface and startup friction
        run: python tools/audit_public_command_friction.py

      - name: Audit public invite permissions
        run: python tools/audit_public_invite_permissions.py

      - name: Audit setup safety rules
        run: python tools/audit_setup_safety.py

      - name: Audit Dank Design Smart Auto-Detect
        run: python tools/audit_dank_design_smart_auto_detect.py

      - name: Audit role truth ownership
        run: python tools/audit_role_truth.py

      - name: Audit event boundary ownership
        run: python tools/audit_event_boundary.py

  migrate-aio-setup-tests-once:
    name: Migrate AIO setup behavior tests once
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/setup-navigation-ux-overhaul'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Check one-time gate
        id: gate
        shell: bash
        run: |
          if [[ -f .github/APPLY_SETUP_AIO_TEST_MIGRATION_ONCE ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest

      - name: Migrate obsolete setup tests
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: python tools/migrate_setup_aio_behavior_tests.py

      - name: Remove temporary migration scaffolding
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/APPLY_SETUP_AIO_TEST_MIGRATION_ONCE
          rm -f tools/migrate_setup_aio_behavior_tests.py

      - name: Validate final behavior suite and production audits
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          set -o pipefail
          (
            set -u
            status=0
            git diff --check || status=1
            python -m compileall -q stoney_verify main.py tools || status=1
            python -m pytest tests/ -q --tb=short --disable-warnings || status=1
            for f in tools/test_*.py; do
              echo "::group::$f"
              python "$f" || status=1
              echo "::endgroup::"
            done
            for audit in \
              tools/audit_public_setup.py \
              tools/audit_public_command_surface.py \
              tools/audit_public_command_friction.py \
              tools/audit_public_invite_permissions.py \
              tools/audit_setup_safety.py \
              tools/audit_dank_design_smart_auto_detect.py \
              tools/audit_role_truth.py \
              tools/audit_event_boundary.py; do
              echo "::group::$audit"
              python "$audit" || status=1
              echo "::endgroup::"
            done
            exit "$status"
          ) 2>&1 | tee /tmp/aio-test-migration-validation.log

      - name: Upload failed migration validation
        if: failure() && steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aio-test-migration-validation-failure
          path: /tmp/aio-test-migration-validation.log
          retention-days: 1

      - name: Prepare validated migration commit
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -o pipefail
          (
            set -euo pipefail
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git reset
            git add -A
            echo "=== STAGED FILES ==="
            git diff --cached --name-status
            unexpected="$(git diff --cached --name-only | grep -Ev '^(tests/.*|\.github/workflows/ci\.yml|\.github/APPLY_SETUP_AIO_TEST_MIGRATION_ONCE|stoney_verify/commands_ext/public_setup_recommend\.py|tools/migrate_setup_aio_behavior_tests\.py|tools/audit_setup_safety\.py|tools/test_custom_state_and_launch_actions\.py|tools/test_setup_.*\.py)$' || true)"
            if [[ -n "$unexpected" ]]; then
              echo "Unexpected staged files:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            git commit -m "Migrate setup tests to the AIO behavior contract"
          ) 2>&1 | tee /tmp/aio-test-migration-commit.log

      - name: Push validated migration commit
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -o pipefail
          git push origin HEAD:fix/setup-navigation-ux-overhaul 2>&1 | tee -a /tmp/aio-test-migration-commit.log

      - name: Upload failed commit or push log
        if: failure() && steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: aio-test-migration-commit-failure
          path: /tmp/aio-test-migration-commit.log
          retention-days: 1
