name: Dank Shield CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  python-compile:
    name: Python compile check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python modules
        run: python -m compileall -q stoney_verify main.py tools

      - name: Run unit test suite
        run: python -m pytest tests/ -q
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run standalone tool checks
        run: |
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Audit public setup text and isolation
        run: python tools/audit_public_setup.py

      - name: Audit public command surface and startup friction
        run: python tools/audit_public_command_friction.py

      - name: Audit public invite permissions
        run: python tools/audit_public_invite_permissions.py

      - name: Audit setup safety rules
        run: python tools/audit_setup_safety.py

      - name: Audit role truth ownership
        run: python tools/audit_role_truth.py

      - name: Audit event boundary ownership
        run: python tools/audit_event_boundary.py

  finalize-startup-health-fixes:
    name: Finalize startup health fixes
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/startup-spamguard-command-activity-health' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out latest feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/startup-spamguard-command-activity-health
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply permanent fixes
        run: python tools/apply_startup_spamguard_command_activity_fix.py

      - name: Validate focused behavior
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m py_compile \
            stoney_verify/spam_guard.py \
            stoney_verify/startup_guards/setup_service_modes.py \
            stoney_verify/commands_ext/__init__.py \
            stoney_verify/startup_guards/slash_command_cleanup.py \
            stoney_verify/members_new/activity_reconciliation.py \
            tools/audit_public_command_friction.py \
            tests/test_startup_spamguard_command_activity_cleanup.py
          python -m pytest tests/test_startup_spamguard_command_activity_cleanup.py -q
          python tools/audit_public_command_friction.py
          git diff --check

      - name: Validate full repository
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m pytest tests/ -q
          status=0
          for f in tools/test_*.py; do
            python "$f" || status=1
          done
          test "$status" -eq 0
          python tools/audit_public_setup.py
          python tools/audit_public_command_friction.py
          python tools/audit_public_invite_permissions.py
          python tools/audit_setup_safety.py
          python tools/audit_role_truth.py
          python tools/audit_event_boundary.py

      - name: Remove temporary validation machinery
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f tools/apply_startup_spamguard_command_activity_fix.py
          git diff --check

      - name: Commit permanent fixes only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden startup health and default Spam Guard on"
          git push origin HEAD:fix/startup-spamguard-command-activity-health
