name: Temporary PR99 pytest log

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest-log:
    if: github.head_ref == 'fix/setup-access-spamguard-defaults-startup-cleanup'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest
      - name: Run pytest and capture output
        run: |
          set +e
          python -m pytest tests/ -q --tb=short --disable-warnings > /tmp/pr99-pytest.log 2>&1
          code=$?
          echo "$code" > /tmp/pr99-pytest-exit.txt
          exit 0
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
      - name: Upload pytest output
        uses: actions/upload-artifact@v4
        with:
          name: pr99-pytest-log
          path: |
            /tmp/pr99-pytest.log
            /tmp/pr99-pytest-exit.txt
          retention-days: 1
