name: SG-STATS-001 finalizer

on:
  push:
    branches:
      - feature/spamguard-live-stats-channels
  pull_request:

permissions:
  contents: write

jobs:
  apply-test-clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/spamguard-live-stats-channels
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply native runtime integration
        run: |
          git apply --check patches/sg-stats-001-live-discord-channels.patch
          git apply patches/sg-stats-001-live-discord-channels.patch
          git diff --check

      - name: Run focused live-stats tests
        run: |
          python -m pytest tests/test_security_stats_channels.py tests/test_public_protection_center_native_interaction_static.py -q
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Compile Python modules
        run: python -m compileall -q stoney_verify main.py tools

      - name: Run full unit suite
        run: python -m pytest tests/ -q
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run standalone tool checks
        run: |
          status=0
          for f in tools/test_*.py; do
            echo "::group::$f"
            python "$f" || status=1
            echo "::endgroup::"
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet

      - name: Run public and safety audits
        run: |
          python tools/audit_public_setup.py
          python tools/audit_public_command_friction.py
          python tools/audit_public_invite_permissions.py
          python tools/audit_setup_safety.py
          python tools/audit_role_truth.py
          python tools/audit_event_boundary.py
          if [ -f tools/audit_invite_link_safety.py ]; then python tools/audit_invite_link_safety.py; fi

      - name: Inspect conflicts and duplicate ownership
        run: |
          git diff --check
          test "$(grep -R --exclude='*.pyc' --exclude='security_stats.py' --exclude='test_security_stats_channels.py' -l 'SECURITY_STATS_CATEGORY_NAME' stoney_verify tests 2>/dev/null | wc -l)" -le 1
          grep -n "record_spam_guard_action" stoney_verify/spam_guard.py
          grep -n "record_security_event" stoney_verify/invite_policy_engine.py
          grep -n "dank_protection:live_stats" stoney_verify/commands_ext/public_protection_center.py

      - name: Mark task validation complete
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('ACTIVE_TASK.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('**Status:** IN PROGRESS', '**Status:** COMPLETE — awaiting merge/deploy approval')
          text = text.replace('- Runtime hooks into Spam Guard, invite policy, and `/dank protection` are pending application.', '- Runtime hooks are applied to Spam Guard, the authoritative invite-delete path, and `/dank protection`.')
          text = text.replace('- Targeted tests: PENDING', '- Targeted tests: PASS')
          text = text.replace('- Full unit suite: PENDING', '- Full unit suite: PASS')
          text = text.replace('- Python compile check: PENDING', '- Python compile check: PASS')
          text = text.replace('- Standalone `tools/test_*.py`: PENDING', '- Standalone `tools/test_*.py`: PASS')
          text = text.replace('- Public/setup/safety/role/event audits: PENDING', '- Public/setup/safety/role/event audits: PASS')
          text = text.replace('- Conflict inspection: PENDING', '- Conflict inspection: PASS')
          text = text.replace('- Temporary patch/workflow files: NOT YET CREATED', '- Temporary patch/workflow files: removed before final commit')
          text = text.replace('- [ ] Runtime event hooks applied', '- [x] Runtime event hooks applied')
          text = text.replace('- [ ] `/dank protection` activation UI applied', '- [x] `/dank protection` activation UI applied')
          text = text.replace('- [ ] Targeted tests pass', '- [x] Targeted tests pass')
          text = text.replace('- [ ] Full regression suite passes', '- [x] Full regression suite passes')
          text = text.replace('- [ ] Compile/static validation passes', '- [x] Compile/static validation passes')
          text = text.replace('- [ ] Cleanup complete', '- [x] Cleanup complete')
          text = text.replace('- [ ] Conflict inspection complete', '- [x] Conflict inspection complete')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary patch machinery
        run: |
          rm -f patches/sg-stats-001-live-discord-channels.patch
          rm -f .github/workflows/sg-stats-001-finalizer.yml
          git diff --check

      - name: Commit validated permanent changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add live Discord SpamGuard stats channels"
          git push origin HEAD:feature/spamguard-live-stats-channels
