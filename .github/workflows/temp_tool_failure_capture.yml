name: Temporary standalone tool failure capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'fix/finish-dank-shield-stability-mission'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest
      - name: Capture standalone tool output
        run: |
          set -o pipefail
          status=0
          : > /tmp/tool-failure.log
          for f in tools/test_*.py; do
            echo "===== $f =====" | tee -a /tmp/tool-failure.log
            python "$f" 2>&1 | tee -a /tmp/tool-failure.log || status=1
          done
          exit $status
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-tool-failure-log-final
          path: /tmp/tool-failure.log
          retention-days: 1
