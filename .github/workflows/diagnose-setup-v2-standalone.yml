name: Diagnose setup v2 standalone checks

on:
  pull_request:
    types: [synchronize]
    branches: [main]

concurrency:
  group: setup-v2-standalone-diagnose-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run standalone checks
        id: standalone
        continue-on-error: true
        shell: bash
        run: |
          status=0
          : > setup-v2-standalone-output.txt
          for f in tools/test_*.py; do
            echo "===== $f =====" >> setup-v2-standalone-output.txt
            python "$f" >> setup-v2-standalone-output.txt 2>&1 || status=1
          done
          exit $status

      - name: Save standalone failure tail
        if: steps.standalone.outcome == 'failure'
        shell: bash
        run: |
          tail -300 setup-v2-standalone-output.txt > setup-v2-standalone-failure.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup-v2-standalone-failure.txt
          git commit -m "chore: capture final setup standalone failure" || true
          git push origin HEAD:fix/setup-single-path-front-door-v2
          exit 1

      - name: Confirm standalone checks passed
        if: steps.standalone.outcome == 'success'
        run: echo "All standalone checks passed"
