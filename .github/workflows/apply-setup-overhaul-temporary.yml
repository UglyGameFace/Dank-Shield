name: Apply setup overhaul temporary

on:
  push:
    branches:
      - fix/setup-navigation-ux-overhaul
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-setup-overhaul-temporary
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Clone authenticated feature branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf "$HOME/Dank-Shield"
          git clone --branch fix/setup-navigation-ux-overhaul --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$HOME/Dank-Shield"
          cd "$HOME/Dank-Shield"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply with disposable preflight
        run: |
          cd "$HOME/Dank-Shield"
          bash tools/run_setup_navigation_ux_overhaul_v3.sh

      - name: Show resulting branch state
        run: |
          cd "$HOME/Dank-Shield"
          git status --short
          git log -3 --oneline
