name: Finalize setup home invalid emoji hotfix

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'hotfix/setup-home-invalid-emoji' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate hotfix
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m py_compile stoney_verify/commands_ext/public_setup_recommend.py
          python -m pytest tests/test_setup_home_button_emoji_static.py -q
          python -m pytest tests/ -q
          status=0
          for f in tools/test_*.py; do
            python "$f" || status=1
          done
          test "$status" -eq 0
          python tools/audit_setup_safety.py
          git diff --check

      - name: Remove temporary workflow
        run: |
          rm -f .github/workflows/apply-setup-home-invalid-emoji-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "chore: remove temporary setup emoji hotfix workflow"
          git push origin HEAD:hotfix/setup-home-invalid-emoji
