name: Apply external Healthchecks watchdog

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/external-healthchecks-watchdog' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply watchdog patch
        run: python tools/apply_external_healthchecks_watchdog.py

      - name: Validate watchdog and existing startup fixes
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m py_compile \
            stoney_verify/startup_guards/process_health.py \
            stoney_verify/commands_ext/public_status_reporter.py \
            tests/test_external_healthchecks_watchdog_static.py
          python -m pytest tests/test_external_healthchecks_watchdog_static.py tests/test_spam_guard_default_on_bootstrap_static.py -q
          python -m pytest tests/ -q
          status=0
          for f in tools/test_*.py; do
            python "$f" || status=1
          done
          test "$status" -eq 0
          python tools/audit_public_command_friction.py
          python tools/audit_setup_safety.py
          git diff --check

      - name: Commit permanent changes only
        run: |
          rm -f tools/apply_external_healthchecks_watchdog.py
          rm -f .github/workflows/apply-external-healthchecks-watchdog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: add real external Healthchecks watchdog heartbeat"
          git push origin HEAD:fix/external-healthchecks-watchdog
