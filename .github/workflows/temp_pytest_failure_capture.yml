name: Temporary pytest failure capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    if: github.head_ref == 'fix/finish-dank-shield-stability-mission'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip -q
          pip install -q -r requirements.txt
          pip install -q pytest
      - name: Capture pytest output
        run: |
          set -o pipefail
          python -m pytest tests/ -q --tb=short --disable-warnings 2>&1 | tee /tmp/pytest-failure.log
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-log-final
          path: /tmp/pytest-failure.log
          retention-days: 1
