name: Apply final setup v2 consistency

on:
  pull_request:
    types: [synchronize]
    branches: [main]

concurrency:
  group: setup-v2-final-consistency-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply final consistency patch
        run: python tools/apply_setup_v2_final_consistency.py

      - name: Validate all unit tests
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m pytest tests/ -q
          git diff --check

      - name: Commit final consistency patch
        run: |
          rm -f tools/apply_setup_v2_final_consistency.py
          rm -f .github/workflows/apply-setup-v2-final-consistency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ux: finish one-path setup wording consistency"
          git push origin HEAD:fix/setup-single-path-front-door-v2
