name: Apply one-path setup front door v2

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply base setup UX rewrite
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          rm -f setup-ux-applier-error.txt
          python tools/apply_setup_single_path_front_door_v2.py > setup-ux-applier-output.txt 2>&1

      - name: Finalize plain-language setup UX
        id: finalize
        continue-on-error: true
        shell: bash
        run: |
          python tools/finalize_setup_single_path_front_door_v2.py >> setup-ux-applier-output.txt 2>&1

      - name: Capture rewrite failure
        if: steps.finalize.outcome == 'failure'
        shell: bash
        run: |
          cp setup-ux-applier-output.txt setup-ux-applier-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup-ux-applier-error.txt
          git commit -m "chore: capture one-path setup rewrite failure" || true
          git push origin HEAD:fix/setup-single-path-front-door-v2
          exit 1

      - name: Validate rewritten files
        if: steps.finalize.outcome == 'success'
        run: |
          python -m py_compile \
            stoney_verify/commands_ext/public_setup_recommend.py \
            stoney_verify/commands_ext/public_setup_fresh_choice.py \
            tests/test_setup_single_path_front_door_v2_static.py
          python -m pytest tests/test_setup_single_path_front_door_v2_static.py -q
          git diff --check

      - name: Commit rewritten setup flow
        if: steps.finalize.outcome == 'success'
        run: |
          rm -f setup-ux-applier-output.txt
          rm -f setup-ux-applier-error.txt
          rm -f tools/apply_setup_single_path_front_door_v2.py
          rm -f tools/finalize_setup_single_path_front_door_v2.py
          rm -f .github/workflows/apply-setup-single-path-front-door-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ux: enforce one clear plain-language Dank setup path"
          git push origin HEAD:fix/setup-single-path-front-door-v2
