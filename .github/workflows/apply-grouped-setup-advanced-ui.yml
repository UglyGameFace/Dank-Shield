name: Apply grouped setup advanced UI

on:
  push:
    branches:
      - fix/setup-advanced-options-grouped-mobile

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/setup-advanced-options-grouped-mobile

      - name: Reorganize advanced setup UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source_path = Path('stoney_verify/commands_ext/public_setup_recommend.py')
          source = source_path.read_text(encoding='utf-8')

          open_block = '''def _advanced_section_embed(
              *,
              title: str,
              description: str,
              items: tuple[str, ...],
              danger: bool = False,
          ) -> discord.Embed:
              embed = discord.Embed(
                  title=title,
                  description=description,
                  color=(
                      discord.Color.red()
                      if danger
                      else discord.Color.blurple()
                  ),
                  timestamp=now_utc(),
              )
              embed.add_field(
                  name="In This Section",
                  value="\\n".join(items)[:1024],
                  inline=False,
              )
              embed.set_footer(
                  text=(
                      "Advanced Options • Back to Advanced returns to the "
                      "grouped menu"
                  )
              )
              return embed


          async def _open_advanced_section(
              interaction: discord.Interaction,
              *,
              title: str,
              description: str,
              items: tuple[str, ...],
              view: discord.ui.View,
              danger: bool = False,
          ) -> None:
              if not await solid._require_setup_permission(interaction):
                  return

              await solid._edit_or_followup(
                  interaction,
                  embed=_advanced_section_embed(
                      title=title,
                      description=description,
                      items=items,
                      danger=danger,
                  ),
                  view=view,
              )


          async def _open_advanced_core_setup(
              interaction: discord.Interaction,
          ) -> None:
              await _open_advanced_section(
                  interaction,
                  title="🧰 Core Setup",
                  description=(
                      "Change the main setup behavior without digging through "
                      "unrelated tools."
                  ),
                  items=(
                      "🧩 **Features On / Off** — choose which services run.",
                      "⏱️ **Timers & Behavior** — timers, naming, and flow settings.",
                      "🧭 **Detailed Role / Channel Mapping** — deliberately remap saved items.",
                  ),
                  view=AdvancedCoreSetupView(),
              )


          async def _open_advanced_member_experience(
              interaction: discord.Interaction,
          ) -> None:
              await _open_advanced_section(
                  interaction,
                  title="👥 Member Experience",
                  description=(
                      "Adjust what members interact with during tickets and "
                      "server protection flows."
                  ),
                  items=(
                      "🧾 **Ticket Choices** — edit what members can request.",
                      "🛡️ **Protection** — open the Protection Center.",
                  ),
                  view=AdvancedMemberExperienceView(),
              )


          async def _open_advanced_monitoring_repair(
              interaction: discord.Interaction,
          ) -> None:
              await _open_advanced_section(
                  interaction,
                  title="🧰 Monitoring & Repair",
                  description=(
                      "Manage server event tracking and repair saved setup "
                      "permissions."
