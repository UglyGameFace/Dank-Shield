                  ),
                  inline=False,
              )

              await solid._edit_or_followup(
                  interaction,
                  embed=embed,
                  view=ManageSetupView(),
              )
          '''

          source, count = re.subn(
              r'async def _open_manage_setup\(\n.*?\n\n\ndef _setup_bool',
              open_block + '\n\n\ndef _setup_bool',
              source,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'expected one _open_manage_setup block, replaced {count}')

          view_block = '''class ManageSetupView(discord.ui.View):
