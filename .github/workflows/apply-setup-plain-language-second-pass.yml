name: Apply setup plain-language second pass

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install pytest

      - name: Apply cleanup
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          rm -f setup-plain-language-error.txt
          python tools/apply_setup_plain_language_second_pass.py > setup-plain-language-output.txt 2>&1

      - name: Capture cleanup failure
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          cp setup-plain-language-output.txt setup-plain-language-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup-plain-language-error.txt
          git commit -m "chore: capture plain-language setup cleanup failure" || true
          git push origin HEAD:fix/setup-single-path-front-door-v2
          exit 1

      - name: Validate cleanup
        if: steps.apply.outcome == 'success'
        run: |
          python -m py_compile \
            stoney_verify/commands_ext/public_setup_recommend.py \
            stoney_verify/commands_ext/public_setup_fresh_choice.py \
            tests/test_setup_single_path_front_door_v2_static.py
          python -m pytest tests/test_setup_single_path_front_door_v2_static.py -q
          git diff --check

      - name: Commit cleanup
        if: steps.apply.outcome == 'success'
        run: |
          rm -f setup-plain-language-output.txt
          rm -f setup-plain-language-error.txt
          rm -f tools/apply_setup_plain_language_second_pass.py
          rm -f .github/workflows/apply-setup-plain-language-second-pass.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ux: finish plain-language cleanup across Dank setup"
          git push origin HEAD:fix/setup-single-path-front-door-v2
