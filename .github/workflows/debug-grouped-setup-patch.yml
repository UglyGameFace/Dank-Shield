name: Debug grouped setup patch

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  debug:
    if: github.head_ref == 'fix/setup-advanced-options-grouped-mobile' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Apply patch or capture traceback
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap
          import traceback

          workflow = Path('.github/workflows/apply-grouped-setup-advanced-ui.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          try:
              start = text.index(start_marker) + len(start_marker)
              end = text.index(end_marker, start)
              script = textwrap.dedent(text[start:end])
              exec(compile(script, str(workflow), 'exec'), {'__name__': '__main__'})
          except BaseException:
              Path('patch-error.txt').write_text(traceback.format_exc(), encoding='utf-8')
          PY

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f patch-error.txt ]; then
            rm -f .github/workflows/debug-grouped-setup-patch.yml
            rm -f .github/workflows/apply-grouped-setup-advanced-ui-pr.yml
          fi
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: capture grouped setup patch result"
            git push origin HEAD:fix/setup-advanced-options-grouped-mobile
          fi
