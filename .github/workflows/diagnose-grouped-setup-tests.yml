name: Diagnose grouped setup tests

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/setup-advanced-options-grouped-mobile'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run full pytest and show failure tail
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        shell: bash
        run: |
          set +e
          python -m pytest tests/ -q --tb=short > pytest-output.txt 2>&1
          rc=$?
          tail -160 pytest-output.txt
          exit $rc
