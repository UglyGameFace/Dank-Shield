name: Diagnose grouped setup tests

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'fix/setup-advanced-options-grouped-mobile'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run grouped setup tests
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        run: |
          python -m pytest \
            tests/test_setup_advanced_options_behavior.py \
            tests/test_setup_single_guided_front_door_static.py \
            tests/test_setup_ux_clarity_guard_retired.py \
            -q
          python tools/audit_setup_safety.py
