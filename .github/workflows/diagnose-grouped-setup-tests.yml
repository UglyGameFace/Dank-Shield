name: Diagnose grouped setup tests

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/setup-advanced-options-grouped-mobile' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run standalone tools
        id: standalone
        continue-on-error: true
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        shell: bash
        run: |
          status=0
          : > standalone-output.txt
          for f in tools/test_*.py; do
            echo "===== $f =====" >> standalone-output.txt
            python "$f" >> standalone-output.txt 2>&1 || status=1
          done
          exit $status
      - name: Save standalone tail to branch
        if: always()
        shell: bash
        run: |
          tail -240 standalone-output.txt > standalone-failure-tail.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add standalone-failure-tail.txt
          git commit -m "chore: capture grouped setup standalone tail" || true
          git push origin HEAD:fix/setup-advanced-options-grouped-mobile
      - name: Fail when standalone checks failed
        if: steps.standalone.outcome == 'failure'
        run: exit 1
