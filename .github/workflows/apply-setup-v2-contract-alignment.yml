name: Align one-path setup contracts

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  align:
    if: github.head_ref == 'fix/setup-single-path-front-door-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Remove final legacy setup wording
        run: python tools/apply_setup_v2_last_cleanup.py

      - name: Align stale setup contracts
        run: python tools/apply_setup_v2_contract_alignment.py

      - name: Run full unit suite
        id: pytest
        continue-on-error: true
        env:
          DANK_STARTUP_LOG_STYLE: quiet
          DANK_COMMAND_LOG_STYLE: quiet
        shell: bash
        run: |
          python -m pytest tests/ -q --tb=short > setup-v2-aligned-pytest-output.txt 2>&1

      - name: Capture remaining failures
        if: steps.pytest.outcome == 'failure'
        shell: bash
        run: |
          tail -260 setup-v2-aligned-pytest-output.txt > setup-v2-aligned-pytest-tail.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup-v2-aligned-pytest-tail.txt
          git commit -m "chore: capture remaining aligned setup test failures" || true
          git push origin HEAD:fix/setup-single-path-front-door-v2
          exit 1

      - name: Check diff
        if: steps.pytest.outcome == 'success'
        run: git diff --check

      - name: Commit aligned contracts
        if: steps.pytest.outcome == 'success'
        run: |
          rm -f setup-v2-aligned-pytest-output.txt
          rm -f setup-v2-aligned-pytest-tail.txt
          rm -f tools/apply_setup_v2_contract_alignment.py
          rm -f tools/apply_setup_v2_last_cleanup.py
          rm -f .github/workflows/apply-setup-v2-contract-alignment.yml
          rm -f setup-v2-pytest-tail.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: align setup contracts with one-path plain-language UX"
          git push origin HEAD:fix/setup-single-path-front-door-v2
